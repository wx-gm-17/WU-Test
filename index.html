<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cannoli Pro v28 (Final Proxy)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --bg: #060d14; --card: rgba(18, 32, 47, 0.95); --accent: #00d2ff; --border: rgba(255, 255, 255, 0.15); --text: #fff; }
body { margin:0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; text-align: center; }
header { background: #0b141d; padding: 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
.card { background: var(--card); padding: 40px 20px; border-radius: 28px; border: 1px solid var(--border); }
.main-val { font-size: 70px; font-weight: 900; margin: 10px 0; color: var(--accent); }
#status { background: #ff4d4d; color: white; padding: 10px; display: none; font-size: 13px; font-weight: 700; }
.label { color: #8899a6; font-weight: 900; font-size: 14px; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div style="font-weight: 900; font-size: 20px;">🐾 CANNOLI v28</div>
  <input type="date" id="targetDate" onchange="fetchData(this.value)" style="background:#14212d; color:white; border:1px solid var(--border); padding:8px; border-radius:10px;">
</header>
<div id="status"></div>

<div class="dashboard">
  <div class="card"><div class="label">TEMP</div><div id="v-temp" class="main-val">--</div></div>
  <div class="card"><div class="label">WIND</div><div id="v-wind" class="main-val">--</div></div>
  <div class="card"><div class="label">RAIN</div><div id="v-rain" class="main-val">--</div></div>
</div>

<script>
const wuKey = "0b649979d0b348b1a49979d0b318b138";
const stationId = "KCOARVAD722";

async function fetchData(selectedDate) {
    const status = document.getElementById('status');
    status.style.display = 'none';

    let d = selectedDate ? new Date(selectedDate + "T12:00:00") : new Date();
    const dateStr = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');

    const targetUrl = `https://api.weather.com/v2/pws/history/all?stationId=${stationId}&format=json&units=e&date=${dateStr}&apiKey=${wuKey}&numericPrecision=decimal`;
    
    // Using 'cors-anywhere' through a different mirror to bypass the IBM block
    const proxyUrl = `https://cors-anywhere.herokuapp.com/${targetUrl}`;

    try {
        // We add a 'X-Requested-With' header which some proxies require
        const response = await fetch(proxyUrl, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        
        if (response.status === 403) {
            // If the proxy itself requires a "handshake", we show a special message
            throw new Error("Click the link to 'Request Temporary Access' to the proxy first.");
        }

        const json = await response.json();
        const latest = json.observations[json.observations.length - 1].imperial;
        
        document.getElementById('v-temp').innerText = Math.round(latest.tempAvg) + "°";
        document.getElementById('v-wind').innerText = Math.round(latest.windspeedAvg);
        document.getElementById('v-rain').innerText = latest.precipTotal.toFixed(2);
        
    } catch (e) {
        status.innerHTML = `PROXY BLOCKED: <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="color:white">Click Here & Press 'Request Access'</a> then refresh this page.`;
        status.style.display = 'block';
    }
}

// Initial Load
const today = new Date().toISOString().split('T')[0];
document.getElementById('targetDate').value = today;
fetchData(today);
</script>
</body>
</html>
